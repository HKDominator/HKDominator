<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" width="820" height="240"
     font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', SFMono-Regular, Menlo, Consolas, monospace">

  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Window chrome -->
  <g filter="url(#shadow)">
    <rect x="4" y="4" width="812" height="232" rx="10" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
    <path d="M14,4 h792 a10,10 0 0 1 10,10 v18 h-812 v-18 a10,10 0 0 1 10,-10 z" fill="#21262d"/>
    <line x1="4" y1="32" x2="816" y2="32" stroke="#30363d" stroke-width="1"/>
    <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
    <circle cx="42" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="18" r="6" fill="#27c93f"/>
    <text x="410" y="22" text-anchor="middle" font-size="11" fill="#8b949e">andrei@github  ──  /home/andrei</text>
  </g>

  <!-- Command -->
  <g font-size="13" xml:space="preserve">
    <text x="22" y="62">
      <tspan fill="#7ee787" font-weight="bold">andrei@github</tspan><tspan fill="#c9d1d9">:</tspan><tspan fill="#79c0ff" font-weight="bold">~</tspan><tspan fill="#c9d1d9">$ whoami --verbose</tspan>
    </text>
  </g>

  <!-- Output -->
  <g font-size="13" xml:space="preserve">
    <text x="40" y="100">
      <tspan fill="#79c0ff" font-weight="bold">user</tspan><tspan fill="#6e7681">........... </tspan><tspan fill="#c9d1d9">Andrei-Darius Bodrogean</tspan>
    </text>
    <text x="40" y="122">
      <tspan fill="#79c0ff" font-weight="bold">email</tspan><tspan fill="#6e7681">.......... </tspan><tspan fill="#c9d1d9">bodrogean.andrei@gmail.com</tspan>
    </text>
    <text x="40" y="144">
      <tspan fill="#79c0ff" font-weight="bold">linkedin</tspan><tspan fill="#6e7681">....... </tspan><tspan fill="#c9d1d9">/in/andrei-darius-bodrogean-3b5674310</tspan>
    </text>
    <text x="40" y="166">
      <tspan fill="#79c0ff" font-weight="bold">github</tspan><tspan fill="#6e7681">......... </tspan><tspan fill="#c9d1d9">@HKDominator</tspan>
    </text>
  </g>

  <!-- Final prompt + cursor -->
  <g font-size="13" xml:space="preserve">
    <text x="22" y="208">
      <tspan fill="#7ee787" font-weight="bold">andrei@github</tspan><tspan fill="#c9d1d9">:</tspan><tspan fill="#79c0ff" font-weight="bold">~</tspan><tspan fill="#c9d1d9">$ </tspan>
    </text>
    <rect x="148" y="196" width="8" height="14" fill="#c9d1d9">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

</svg>
